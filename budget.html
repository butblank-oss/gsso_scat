              <div className="flex gap-2 text-xs">
                <button onClick={() => { setEditingGroup(g); setShowGroupForm(true); }} className="text-slate-400 hover:text-slate-600">수정</button>
                <button onClick={() => deleteGroup(g.id)} className="text-red-400 hover:text-red-500">삭제</button>
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold">카테고리 관리 (소분류)</div>
          <Button onClick={() => { setEditingCat(null); setShowCatForm(true); }}>+ 카테고리 추가</Button>
        </div>
        {['income', 'fixed_expense', 'variable_expense', 'savings'].map(type => {
          const catsOfType = categories.filter(c => c.type === type);
          const byGroup = {};
          catsOfType.forEach(c => {
            const gid = c.group_id || 'ungrouped';
            if (!byGroup[gid]) byGroup[gid] = [];
            byGroup[gid].push(c);
          });
          const groupMap = Object.fromEntries(categoryGroups.map(g => [g.id, g]));
          return (
            <div key={type} className="mb-4 last:mb-0">
              <div className="text-xs font-semibold text-slate-400 mb-2">{TYPE_LABEL[type]}</div>
              <div className="space-y-3">
                {Object.entries(byGroup).map(([gid, cats]) => {
                  const group = groupMap[gid] || { name: '기타', icon: '📦' };
                  return (
                    <div key={gid}>
                      <div className="text-[11px] text-slate-400 mb-1 flex items-center gap-1">
                        <span>{group.icon}</span><span>{group.name}</span>
                      </div>
                      <div className="space-y-1.5 pl-2 border-l-2 border-slate-100 dark:border-slate-800">
                        {cats.map(c => (
                          <div key={c.id} className="flex items-center justify-between py-1">
                            <div className="flex items-center gap-2 text-sm">
                              <span className="w-2.5 h-2.5 rounded-full" style={{ background: c.color }} />
                              <span>{c.icon} {c.name}</span>
                            </div>
                            <div className="flex gap-2 text-xs">
                              <button onClick={() => { setEditingCat(c); setShowCatForm(true); }} className="text-slate-400 hover:text-slate-600">수정</button>
                              <button onClick={() => deleteCategory(c.id)} className="text-red-400 hover:text-red-500">삭제</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </Card>

      <Card>
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold">결제수단 관리</div>
          <Button onClick={() => { setEditingPm(null); setShowPmForm(true); }}>+ 결제수단 추가</Button>
        </div>
        {paymentMethods.length === 0 && <div className="text-sm text-slate-400 py-4">신용카드·체크카드·현금·계좌이체 등 자주 쓰는 결제수단을 등록해두면 거래 추가 시 바로 선택할 수 있어요.</div>}
        <div className="space-y-1.5">
          {paymentMethods.map(pm => (
            <div key={pm.id} className="flex items-center justify-between py-1.5">
              <div className="text-sm">{pm.name} <span className="text-xs text-slate-400">({PAYMENT_TYPE_LABEL[pm.type]})</span></div>
              <div className="flex gap-2 text-xs">
                <button onClick={() => { setEditingPm(pm); setShowPmForm(true); }} className="text-slate-400 hover:text-slate-600">수정</button>
                <button onClick={() => deletePaymentMethod(pm.id)} className="text-red-400 hover:text-red-500">삭제</button>
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <div className="font-bold mb-3">데이터 백업 · 복원</div>
        <div className="flex flex-wrap gap-2">
          <Button variant="secondary" onClick={() => exportBackup(fullState)}>전체 백업 (JSON)</Button>
          <Button variant="secondary" onClick={() => downloadFile(`거래내역_${todayKey()}.csv`, transactionsToCSV(transactions, categories, paymentMethods))}>거래내역 내보내기 (CSV)</Button>
          <Button variant="secondary" onClick={() => fileInputRef.current && fileInputRef.current.click()}>백업 파일 복원</Button>
          <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImport} className="hidden" />
        </div>
      </Card>

      <Card>
        <div className="font-bold text-red-500 mb-2">위험 구역</div>
        <div className="text-xs text-slate-400 mb-3">모든 거래·자산·목표·카테고리 데이터를 초기화합니다.</div>
        <Button variant="danger" onClick={handleReset}>전체 데이터 초기화</Button>
      </Card>

      <CategoryFormModal open={showCatForm} onClose={() => setShowCatForm(false)} onSave={saveCategory} initial={editingCat} categoryGroups={categoryGroups} />
      <CategoryGroupFormModal open={showGroupForm} onClose={() => setShowGroupForm(false)} onSave={saveGroup} initial={editingGroup} />
      <PaymentMethodFormModal open={showPmForm} onClose={() => setShowPmForm(false)} onSave={savePaymentMethod} initial={editingPm} />
    </div>
  );
}

/* ============================================================
   Login
   ============================================================ */
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    const { error: err } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) setError('로그인에 실패했어요. 이메일/비밀번호를 확인해주세요.');
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans p-4">
      <div className="w-full max-w-sm bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-6">
        <div className="text-center mb-6">
          <div className="text-2xl mb-1">💼</div>
          <div className="font-extrabold text-lg">내 인생 P&L</div>
          <div className="text-xs text-slate-400 mt-1">로그인하고 내 가계부를 확인하세요</div>
        </div>
        <form onSubmit={handleSubmit}>
          <Field label="이메일">
            <input type="email" required autoFocus value={email} onChange={e => setEmail(e.target.value)} className={inputCls} autoComplete="username" />
          </Field>
          <Field label="비밀번호">
            <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className={inputCls} autoComplete="current-password" />
          </Field>
          {error && <div className="text-xs text-red-500 mb-3">{error}</div>}
          <Button type="submit" variant="primary" className="w-full" disabled={loading}>{loading ? '로그인 중...' : '로그인'}</Button>
        </form>
      </div>
    </div>
  );
}

/* ============================================================
   App root
   ============================================================ */
function App() {
  const [session, setSession] = useState(undefined);
  const [remoteLoaded, setRemoteLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle');

  const [tab, setTab] = useState('dashboard');
  const [transactions, setTransactions] = useLocalState('transactions', []);
  const [categories, setCategories] = useLocalState('categories', DEFAULT_CATEGORIES);
  const [categoryGroups, setCategoryGroups] = useLocalState('categoryGroups', DEFAULT_CATEGORY_GROUPS);
  const [recurring, setRecurring] = useLocalState('recurring', []);
  const [assets, setAssets] = useLocalState('assets', []);
  const [goals, setGoals] = useLocalState('goals', []);
  const [paymentMethods, setPaymentMethods] = useLocalState('paymentMethods', DEFAULT_PAYMENT_METHODS);
  const [expectedIncome, setExpectedIncome] = useLocalState('expectedIncome', 0);
  const [dark, setDark] = useLocalState('dark', false);
  const [monthKey, setMonthKey] = useState(todayMonthKey());
  const [editingTx, setEditingTx] = useState(null);
  const [txModalOpen, setTxModalOpen] = useState(false);
  const [txModalDefaultDate, setTxModalDefaultDate] = useState(null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  useEffect(() => {
    const toAdd = ensureRecurringGenerated(recurring, transactions);
    if (toAdd.length) setTransactions(prev => [...prev, ...toAdd]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [recurring]);

  // One-time, additive-only migration for accounts with categories saved
  // before category groups existed. Never renames/removes existing ids.
  useEffect(() => {
    const migratedCats = migrateCategories(categories);
    if (migratedCats !== categories) setCategories(migratedCats);
    const migratedGroups = migrateCategoryGroups(categoryGroups, migratedCats);
    if (migratedGroups !== categoryGroups) setCategoryGroups(migratedGroups);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Auth: track the logged-in session
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_event, sess) => {
      setSession(sess);
      if (!sess) setRemoteLoaded(false);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  // Cloud sync: pull the saved data down once per login (remote wins over local on login)
  useEffect(() => {
    if (!session || remoteLoaded) return;
    let cancelled = false;
    (async () => {
      const { data, error } = await sb.from('budget_data').select('data').eq('user_id', session.user.id).maybeSingle();
      if (!cancelled && !error && data && data.data) {
        const d = data.data;
        if (d.transactions) setTransactions(d.transactions);
        if (d.categories) setCategories(d.categories);
        if (d.categoryGroups) setCategoryGroups(d.categoryGroups);
        if (d.recurring) setRecurring(d.recurring);
        if (d.assets) setAssets(d.assets);
        if (d.goals) setGoals(d.goals);
        if (d.paymentMethods) setPaymentMethods(d.paymentMethods);
        if (typeof d.expectedIncome === 'number') setExpectedIncome(d.expectedIncome);
      }
      if (!cancelled) setRemoteLoaded(true);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [session, remoteLoaded]);

  // Cloud sync: push changes up (debounced) after the initial pull has completed
  useEffect(() => {
    if (!session || !remoteLoaded) return;
    setSyncStatus('saving');
    const timer = setTimeout(() => {
      sb.from('budget_data').upsert({
        user_id: session.user.id,
        data: { transactions, categories, categoryGroups, recurring, assets, goals, paymentMethods, expectedIncome },
        updated_at: new Date().toISOString(),
      }, { onConflict: 'user_id' }).then(({ error }) => {
        setSyncStatus(error ? 'error' : 'saved');
      });
    }, 800);
    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [session, remoteLoaded, transactions, categories, categoryGroups, recurring, assets, goals, paymentMethods, expectedIncome]);

  const saveTx = (payload) => {
    setTransactions(prev => {
      const idx = prev.findIndex(t => t.id === payload.id);
      if (idx === -1) return [...prev, payload];
      const next = [...prev]; next[idx] = payload; return next;
    });
  };
  const deleteTx = (id) => setTransactions(prev => prev.filter(t => t.id !== id));

  const openAdd = (date) => { setEditingTx(null); setTxModalDefaultDate(date || todayKey()); setTxModalOpen(true); };
  const openEdit = (tx) => { setEditingTx(tx); setTxModalOpen(true); };

  const screenProps = {
    transactions, categories, categoryGroups, recurring, assets, goals, paymentMethods, expectedIncome,
    setCategories, setCategoryGroups, setRecurring, setAssets, setGoals, setPaymentMethods, setExpectedIncome,
    monthKey, setMonthKey, onAdd: openAdd, onEdit: openEdit,
  };

  if (session === undefined) {
    return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 text-slate-400 text-sm">불러오는 중...</div>;
  }
  if (!session) {
    return <LoginScreen />;
  }

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">
      <Sidebar tab={tab} setTab={setTab} dark={dark} setDark={setDark} syncStatus={syncStatus} onLogout={() => sb.auth.signOut()} />
      <div className="md:ml-56 pb-24 md:pb-10">
        <header className="md:hidden flex items-center justify-between px-4 py-4 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-30">
          <div className="font-extrabold">💼 내 인생 P&L</div>
          <div className="flex items-center gap-3">
            <button onClick={() => setDark(!dark)} className="text-lg">{dark ? '☀️' : '🌙'}</button>
            <button onClick={() => sb.auth.signOut()} className="text-xs text-slate-400">로그아웃</button>
          </div>
        </header>
        <main className="max-w-6xl mx-auto p-4 md:p-8">
          {tab === 'dashboard' && <Dashboard {...screenProps} />}
          {tab === 'calendar' && <CalendarScreen {...screenProps} />}
          {tab === 'charts' && <ChartsScreen {...screenProps} />}
          {tab === 'transactions' && <TransactionsScreen {...screenProps} />}
          {tab === 'budget' && <BudgetScreen {...screenProps} />}
          {tab === 'assets' && <AssetsScreen {...screenProps} />}
          {tab === 'goals' && <GoalsScreen {...screenProps} />}
          {tab === 'settings' && (
            <SettingsScreen
              {...screenProps}
              dark={dark}
              setDark={setDark}
              fullState={{ transactions, categories, categoryGroups, recurring, assets, goals, paymentMethods, expectedIncome }}
              onRestore={(data) => {
                if (data.transactions) setTransactions(data.transactions);
                if (data.categories) setCategories(data.categories);
                if (data.categoryGroups) setCategoryGroups(data.categoryGroups);
                if (data.recurring) setRecurring(data.recurring);
                if (data.assets) setAssets(data.assets);
                if (data.goals) setGoals(data.goals);
                if (data.paymentMethods) setPaymentMethods(data.paymentMethods);
                if (typeof data.expectedIncome === 'number') setExpectedIncome(data.expectedIncome);
              }}
            />
          )}
        </main>
      </div>
      <BottomNav tab={tab} setTab={setTab} />
      <button onClick={() => openAdd()} className="fixed right-5 bottom-20 md:bottom-8 w-14 h-14 rounded-full bg-blue-600 text-white text-2xl shadow-lg flex items-center justify-center z-40 active:scale-95 transition">+</button>
      <TransactionModal
        open={txModalOpen}
        onClose={() => setTxModalOpen(false)}
        onSave={saveTx}
        onDelete={deleteTx}
        categories={categories}
        categoryGroups={categoryGroups}
        paymentMethods={paymentMethods}
        initial={editingTx}
        defaultDate={txModalDefaultDate}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
